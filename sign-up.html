<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | NexGen</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Phosphor Icons (Local Offline) -->
    <link rel="stylesheet" type="text/css" href="assets/icons/regular/style.css">
    <link rel="stylesheet" type="text/css" href="assets/icons/fill/style.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-main vh-100 d-flex flex-column">
    <div class="row g-0 flex-grow-1 flex-row-reverse">
        
        <!-- Right Image Section (reversed flex) -->
        <div class="col-lg-6 d-none d-lg-block position-relative bg-dark overflow-hidden">
            <img src="assets/local_img_16.jpg" alt="Cyber Security" class="position-absolute w-100 h-100 object-fit-cover opacity-50">
            <div class="position-absolute w-100 h-100" style="background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);"></div>
            <div class="position-absolute bottom-0 start-0 p-5">
                <h3 class="text-white fw-bold mb-3" style="max-width: 400px;">Join the NexGen Ecosystem today.</h3>
                <p class="text-white-50">Start building the future with our industry-leading platform. Setup is instant and free.</p>
            </div>
        </div>

        <!-- Left Form Section -->
        <div class="col-lg-6 d-flex flex-column align-items-center p-4 p-md-5 bg-main position-relative overflow-auto custom-scrollbar">
            <!-- Theme Toggle absolute position -->
            <button id="theme-toggle" class="btn btn-link text-muted-custom p-3 position-absolute top-0 end-0 text-decoration-none border-0 shadow-none fs-4" aria-label="Toggle Theme">
                <i class="ph ph-moon"></i>
            </button>

            <!-- Top Logo -->
            <div class="w-100 mb-5 d-flex justify-content-start">
                <a class="navbar-brand d-flex align-items-center gap-2 text-main text-decoration-none" href="index.html">
                    <i class="ph-fill ph-hexagon text-primary-custom fs-2"></i>
                    <span class="fs-4 fw-bold">NexGen<span class="text-primary-custom">.</span></span>
                </a>
            </div>

            <div class="w-100 mb-5" style="max-width: 400px;">
                <h2 class="fw-bold mb-2">Create an account</h2>
                <p class="text-muted-custom mb-4">Start your 14-day free trial. No credit card required.</p>
                
                <form>
                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label for="firstName" class="form-label fw-medium">First name</label>
                            <input type="text" class="form-control py-2" id="firstName" placeholder="John" required>
                        </div>
                        <div class="col-sm-6">
                            <label for="lastName" class="form-label fw-medium">Last name</label>
                            <input type="text" class="form-control py-2" id="lastName" placeholder="Doe" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label fw-medium">Email address</label>
                        <input type="email" class="form-control py-2" id="email" placeholder="name@company.com" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-medium mb-1">Password</label>
                        <input type="password" class="form-control py-2" id="password" placeholder="Create a password" required>
                        <div class="form-text text-muted-custom small mt-1">Must be at least 8 characters.</div>
                    </div>
                    
                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-primary-custom py-2 fw-medium">Create Account</button>
                    </div>
                    <div class="d-grid">
                        <button type="button" class="btn btn-outline-custom py-2 fw-medium d-flex align-items-center justify-content-center gap-2">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" width="18">
                            Sign up with Google
                        </button>
                    </div>
                </form>

                <p class="text-center text-muted-custom mt-5 mb-0">
                    Already have an account? <a href="sign-in.html" class="text-primary-custom fw-bold text-decoration-none hover-primary">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script/script.js"></script>
</body>
</html>
